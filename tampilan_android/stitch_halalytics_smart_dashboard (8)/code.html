<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Halalytics Profile Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#0bda84",
                "background-light": "#f5f8f7",
                "background-dark": "#080c0a",
                "card-dark": "rgba(27, 39, 34, 0.6)",
              },
              fontFamily: {
                "display": ["Inter", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        .glass-card {
            background: rgba(16, 34, 27, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(11, 218, 132, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .glow-border:focus-within {
            border-color: #0bda84;
            box-shadow: 0 0 15px rgba(11, 218, 132, 0.3);
        }
        .emerald-gradient {
            background: linear-gradient(135deg, #0bda84 0%, #066e43 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white min-h-screen">
<div class="max-w-[430px] mx-auto min-h-screen flex flex-col relative overflow-hidden pb-10">
<!-- Background Decoration -->
<div class="absolute top-[-10%] right-[-10%] w-64 h-64 bg-primary/10 rounded-full blur-[80px]"></div>
<div class="absolute bottom-[5%] left-[-10%] w-80 h-80 bg-primary/5 rounded-full blur-[100px]"></div>
<!-- Header / Progress Bar Section -->
<div class="px-6 pt-8 pb-4 sticky top-0 z-10 bg-background-dark/80 backdrop-blur-md">
<div class="flex items-center justify-between mb-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 border border-white/10">
<span class="material-symbols-outlined text-white">chevron_left</span>
</button>
<div class="flex flex-col items-center">
<span class="text-[10px] uppercase tracking-[0.2em] text-primary font-bold">Registration</span>
<span class="text-xs text-white/50">Step 2 of 4</span>
</div>
<div class="w-10"></div>
</div>
<div class="h-1 w-full bg-white/10 rounded-full overflow-hidden">
<div class="h-full emerald-gradient w-[40%] rounded-full shadow-[0_0_10px_rgba(11,218,132,0.5)]"></div>
</div>
</div>
<!-- Content Section -->
<div class="px-6 flex-1">
<div class="mt-8 mb-6">
<h1 class="text-3xl font-bold tracking-tight text-white mb-2">Health Profile</h1>
<p class="text-white/60 text-sm leading-relaxed">
                    Personalize your Halalytics experience by providing your essential bio-data. Securely encrypted.
                </p>
</div>
<!-- Basic Info Section -->
<div class="space-y-4 mb-8">
<div class="glass-card glow-border rounded-xl p-1 transition-all duration-300">
<label class="block px-4 pt-3 pb-1 text-[10px] uppercase tracking-widest text-primary font-semibold">Full Name</label>
<input class="w-full bg-transparent border-none text-white focus:ring-0 placeholder:text-white/20 px-4 pb-3" placeholder="Enter your legal name" type="text"/>
</div>
<div class="glass-card glow-border rounded-xl p-1 transition-all duration-300">
<label class="block px-4 pt-3 pb-1 text-[10px] uppercase tracking-widest text-primary font-semibold">Email Address</label>
<input class="w-full bg-transparent border-none text-white focus:ring-0 placeholder:text-white/20 px-4 pb-3" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Blood Type Grid -->
<div class="mb-8">
<p class="text-sm font-medium text-white/80 mb-4 px-1 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-lg">bloodtype</span>
                    Blood Type
                </p>
<div class="grid grid-cols-4 gap-3">
<button class="glass-card rounded-lg py-3 text-sm font-medium border-primary/40 bg-primary/10 text-primary">A+</button>
<button class="glass-card rounded-lg py-3 text-sm font-medium text-white/60 hover:border-primary/40 transition-colors">A-</button>
<button class="glass-card rounded-lg py-3 text-sm font-medium text-white/60 hover:border-primary/40 transition-colors">B+</button>
<button class="glass-card rounded-lg py-3 text-sm font-medium text-white/60 hover:border-primary/40 transition-colors">B-</button>
<button class="glass-card rounded-lg py-3 text-sm font-medium text-white/60 hover:border-primary/40 transition-colors">O+</button>
<button class="glass-card rounded-lg py-3 text-sm font-medium text-white/60 hover:border-primary/40 transition-colors">O-</button>
<button class="glass-card rounded-lg py-3 text-sm font-medium text-white/60 hover:border-primary/40 transition-colors">AB+</button>
<button class="glass-card rounded-lg py-3 text-sm font-medium text-white/60 hover:border-primary/40 transition-colors">AB-</button>
</div>
</div>
<!-- Allergies Multi-select -->
<div class="mb-10">
<div class="flex justify-between items-center mb-4 px-1">
<p class="text-sm font-medium text-white/80 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-lg">warning</span>
                        Allergies &amp; Sensitivities
                    </p>
<span class="text-[10px] text-white/40">Optional</span>
</div>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full glass-card border-white/10 text-xs flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-white/20"></span> Seafood
                    </button>
<button class="px-4 py-2 rounded-full glass-card border-primary/50 text-xs flex items-center gap-2 text-primary bg-primary/5">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span> Peanuts
                    </button>
<button class="px-4 py-2 rounded-full glass-card border-white/10 text-xs flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-white/20"></span> Dairy
                    </button>
<button class="px-4 py-2 rounded-full glass-card border-white/10 text-xs flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-white/20"></span> Gluten
                    </button>
<button class="px-4 py-2 rounded-full glass-card border-primary/50 text-xs flex items-center gap-2 text-primary bg-primary/5">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span> Soy
                    </button>
<button class="px-3 py-2 rounded-full glass-card border-dashed border-white/20 text-xs flex items-center gap-1 text-white/40">
<span class="material-symbols-outlined text-sm">add</span> Other
                    </button>
</div>
</div>
</div>
<!-- Footer Action -->
<div class="px-6 py-6 sticky bottom-0 bg-gradient-to-t from-background-dark via-background-dark/95 to-transparent">
<button class="w-full emerald-gradient h-14 rounded-xl font-bold text-white shadow-[0_0_20px_rgba(11,218,132,0.3)] flex items-center justify-center gap-2 group active:scale-[0.98] transition-transform">
<span>Complete Health Sync</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<div class="mt-6 flex items-center justify-center gap-2 text-white/30">
<span class="material-symbols-outlined text-xs">lock</span>
<p class="text-[10px] uppercase tracking-wider font-medium">End-to-end encrypted vault</p>
</div>
</div>
<!-- Home Indicator Mockup -->
<div class="mx-auto w-32 h-1 bg-white/20 rounded-full mb-2"></div>
</div>
</body></html>
