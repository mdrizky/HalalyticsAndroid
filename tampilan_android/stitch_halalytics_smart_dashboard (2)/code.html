<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI Scanner Interface - Halalytics</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00a86b",
                        "background-light": "#f5f8f7",
                        "background-dark": "#0f231c",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(15, 35, 28, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(0, 168, 107, 0.5);
        }
        .scanner-frame {
            border: 2px solid transparent;
            background: linear-gradient(#0f231c, #0f231c) padding-box,
                        linear-gradient(45deg, #00a86b, transparent, #00a86b) border-box;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-white overflow-hidden h-screen w-full">
<!-- Fullscreen Camera View -->
<div class="relative h-full w-full bg-cover bg-center overflow-hidden" data-alt="Grocery store shelf with various food products" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAJFXPrcTzlA8q5B4EFRWET4XyKeozjPeSh1b7gejDkMwBJ7avVOx3-1eHFr3UZ3lMvk2dLexYS5JlibWQnAwIAGsgqQfmsJcd36ubS8aAKpRpQ78KgsJBzAQKtOgN6WZWSZY4O0-PkWQGZZhYEuBFB4-0bWzYcY1FgrfLVOMCbIA426knNzHrfrVL6EmrTfMfrRZ4KxAcm4G9yTovXDU6A03EOyXS-PTIMN7qqWnilkoeXnQF59Aud0gc88LNiTJY78ByKCOS7TpLL');">
<!-- Camera Overlay Gradient -->
<div class="absolute inset-0 bg-gradient-to-b from-black/60 via-transparent to-black/80"></div>
<!-- Top Navigation (Glassmorphic) -->
<div class="absolute top-0 left-0 right-0 z-20 p-6 flex items-center justify-between">
<button class="glass-panel size-12 rounded-full flex items-center justify-center text-white">
<span class="material-symbols-outlined">history</span>
</button>
<div class="flex flex-col items-center">
<h1 class="text-white font-bold tracking-widest text-sm uppercase">Halalytics AI</h1>
<div class="flex items-center gap-1">
<div class="size-1.5 rounded-full bg-primary animate-pulse"></div>
<span class="text-[10px] text-primary font-medium uppercase tracking-tighter">Live Analysis</span>
</div>
</div>
<button class="glass-panel size-12 rounded-full flex items-center justify-center text-white">
<span class="material-symbols-outlined">flash_on</span>
</button>
</div>
<!-- Scanning Reticle & AR Tag -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="relative w-72 h-72">
<!-- Glowing Focus Square -->
<div class="absolute inset-0 border-2 border-primary/50 rounded-xl neon-glow">
<!-- Corners -->
<div class="absolute -top-1 -left-1 w-8 h-8 border-t-4 border-l-4 border-primary rounded-tl-lg"></div>
<div class="absolute -top-1 -right-1 w-8 h-8 border-t-4 border-r-4 border-primary rounded-tr-lg"></div>
<div class="absolute -bottom-1 -left-1 w-8 h-8 border-b-4 border-l-4 border-primary rounded-bl-lg"></div>
<div class="absolute -bottom-1 -right-1 w-8 h-8 border-b-4 border-r-4 border-primary rounded-br-lg"></div>
<!-- Scan Line -->
<div class="absolute left-0 right-0 h-[2px] bg-primary/40 shadow-[0_0_10px_#00a86b] top-1/2"></div>
</div>
<!-- Floating AR Tag (Neon Green Pill) -->
<div class="absolute -top-12 left-1/2 -translate-x-1/2 flex items-center gap-2 bg-primary px-4 py-2 rounded-full neon-glow transition-all duration-500">
<span class="material-symbols-outlined text-sm text-white fill-1">verified_user</span>
<span class="text-xs font-bold tracking-wider text-white">HALAL CERTIFIED</span>
</div>
<!-- Micro AI Data -->
<div class="absolute -bottom-16 left-0 right-0 flex flex-col items-center gap-1">
<p class="text-[10px] font-mono text-primary/80 uppercase tracking-widest">Matching database...</p>
<div class="w-32 h-1 bg-white/10 rounded-full overflow-hidden">
<div class="w-2/3 h-full bg-primary"></div>
</div>
</div>
</div>
</div>
<!-- Floating Info Overlay (Bottom-mid) -->
<div class="absolute bottom-40 left-6 right-6">
<div class="glass-panel p-4 rounded-xl flex items-center gap-4">
<div class="size-12 rounded-lg bg-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">nutrition</span>
</div>
<div class="flex-1">
<h3 class="text-sm font-bold">Nature's Choice Organic</h3>
<p class="text-xs text-white/60">No prohibited additives detected</p>
</div>
<div class="text-right">
<div class="text-primary font-bold">98%</div>
<div class="text-[10px] text-white/40">MATCH</div>
</div>
</div>
</div>
<!-- Bottom Controls & Tabs -->
<div class="absolute bottom-0 left-0 right-0 glass-panel rounded-t-xl pb-10 pt-4 px-6 border-t border-primary/20">
<!-- Tabs -->
<div class="flex items-center justify-between mb-8 px-4">
<button class="text-[10px] font-bold tracking-widest text-white/40 hover:text-white transition-colors">BARCODE</button>
<div class="flex flex-col items-center">
<button class="text-[10px] font-bold tracking-widest text-primary mb-1">INGREDIENTS</button>
<div class="w-1 h-1 rounded-full bg-primary shadow-[0_0_5px_#00a86b]"></div>
</div>
<button class="text-[10px] font-bold tracking-widest text-white/40 hover:text-white transition-colors">CERTIFICATE</button>
</div>
<!-- Shutter & Controls -->
<div class="flex items-center justify-around">
<button class="size-10 rounded-full glass-panel flex items-center justify-center text-white/60">
<span class="material-symbols-outlined text-xl">image</span>
</button>
<div class="relative group cursor-pointer">
<div class="absolute inset-0 bg-primary/20 rounded-full blur-xl group-hover:bg-primary/40 transition-all"></div>
<div class="relative size-20 rounded-full border-4 border-white/20 p-1 flex items-center justify-center">
<div class="size-full rounded-full bg-white/10 glass-panel flex items-center justify-center">
<div class="size-12 rounded-full bg-primary shadow-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-3xl">camera</span>
</div>
</div>
</div>
</div>
<button class="size-10 rounded-full glass-panel flex items-center justify-center text-white/60">
<span class="material-symbols-outlined text-xl">search</span>
</button>
</div>
</div>
<!-- iOS Home Indicator -->
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-white/20 rounded-full"></div>
</div>
<!-- Floating Quick Status Chip -->
<div class="fixed top-24 left-6 flex items-center gap-2 bg-[#1b2823]/80 backdrop-blur-md px-3 py-1.5 rounded-full border border-primary/30">
<span class="material-symbols-outlined text-primary text-sm">check_circle</span>
<span class="text-[10px] font-bold text-white tracking-widest">HMC CERTIFIED</span>
</div>
</body></html>
