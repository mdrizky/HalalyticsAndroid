<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Halalytics OCR - Haram Detection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1ff9a9",
                        "background-light": "#f5f8f7",
                        "background-dark": "#0f231c",
                        "warning-red": "#ff4d4d",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-frost {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .emerald-glow {
            box-shadow: 0 0 20px rgba(31, 249, 169, 0.3);
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #1ff9a9, transparent);
            position: absolute;
            width: 100%;
            top: 40%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-[#111815] antialiased overflow-hidden h-screen flex flex-col">
<!-- Top Navigation Bar -->
<div class="fixed top-0 left-0 w-full z-50 flex items-center bg-white/60 backdrop-blur-md p-4 pb-2 justify-between border-b border-primary/10">
<div class="text-[#111815] flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined cursor-pointer">arrow_back_ios</span>
</div>
<div class="flex flex-col items-center flex-1">
<h2 class="text-[#111815] text-sm font-bold leading-tight tracking-tight uppercase">Halalytics AI</h2>
<p class="text-[10px] text-primary font-bold uppercase tracking-widest">Scanning Active</p>
</div>
<div class="flex w-12 items-center justify-end">
<button class="flex size-10 items-center justify-center rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined">flashlight_on</span>
</button>
</div>
</div>
<!-- Main Camera Viewport -->
<main class="relative flex-1 w-full bg-slate-200 overflow-hidden">
<!-- Simulated Camera Feed Background -->
<div class="absolute inset-0 bg-cover bg-center" data-alt="Close up view of food ingredient label" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDAK2OFfZW0xFy6nUFKdCNxB9D6Ux0-u__iCzNxQrZ_--Dq4fR-9Bnq0_Yx1NPVAFkQkoR4Rt02GsYv9Zt5LWP-JQuvuLjBJLdT6IpCuoU-Ud5dh2-PdgPOu7SRlALN6_Ab7zg0ZM6TQzThQAX1uWJek3Z6rGD7bEIcKT2Fz4Ai-nFxFJf904u9Bjh9fUX7Tph-ygB6Z5oYC6ybzQolqP9PCS-rZxOP-noaTUT61dVogjbxdZSwvcwUGn9O3YoHYhEHe9AnJxsPsdRv');">
<!-- Scanning Overlay -->
<div class="absolute inset-0 bg-black/5"></div>
<!-- AR Bounding Box - Detected Non-Halal -->
<div class="absolute top-1/3 left-1/4 w-32 h-10 border-2 border-warning-red rounded-lg bg-warning-red/20 backdrop-blur-[2px] flex items-center justify-center">
<div class="absolute -top-6 left-0 bg-warning-red text-white text-[10px] px-2 py-0.5 rounded-sm font-bold uppercase">Gelatin (Porcine)</div>
<div class="scan-line"></div>
</div>
<!-- AR Bounding Box - Detected Non-Halal 2 -->
<div class="absolute top-[55%] right-1/4 w-28 h-8 border-2 border-warning-red rounded-lg bg-warning-red/20 backdrop-blur-[2px] flex items-center justify-center">
<div class="absolute -top-6 left-0 bg-warning-red text-white text-[10px] px-2 py-0.5 rounded-sm font-bold uppercase">E120</div>
</div>
<!-- AR Bounding Box - Safe Ingredient -->
<div class="absolute top-[45%] left-1/2 w-36 h-12 border-2 border-primary/50 rounded-lg bg-primary/10 backdrop-blur-[2px]">
<div class="absolute -top-6 left-0 bg-primary text-background-dark text-[10px] px-2 py-0.5 rounded-sm font-bold uppercase">Soy Lecithin</div>
</div>
<!-- Center Viewfinder Corners -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 pointer-events-none">
<div class="absolute top-0 left-0 w-8 h-8 border-t-2 border-l-2 border-primary"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-2 border-r-2 border-primary"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-2 border-l-2 border-primary"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-2 border-r-2 border-primary"></div>
</div>
</div>
<!-- Camera Controls -->
<div class="absolute bottom-60 left-0 w-full flex items-center justify-center gap-8 px-4 pointer-events-auto">
<button class="flex shrink-0 items-center justify-center rounded-full size-12 glass-frost text-[#111815]">
<span class="material-symbols-outlined">image</span>
</button>
<button class="flex shrink-0 items-center justify-center rounded-full size-20 bg-primary text-background-dark shadow-lg emerald-glow">
<span class="material-symbols-outlined !text-4xl">camera</span>
</button>
<button class="flex shrink-0 items-center justify-center rounded-full size-12 glass-frost text-[#111815]">
<span class="material-symbols-outlined">history</span>
</button>
</div>
</main>
<!-- Bottom Sheet Warning -->
<div class="fixed bottom-0 left-0 w-full z-[60]">
<div class="flex flex-col items-stretch glass-frost rounded-t-[2.5rem] shadow-2xl border-t border-white pb-8">
<div class="flex h-8 w-full items-center justify-center pt-2">
<div class="h-1.5 w-12 rounded-full bg-slate-300"></div>
</div>
<div class="px-6 pt-2">
<div class="flex items-center gap-3 mb-4">
<div class="bg-warning-red/10 p-2 rounded-xl">
<span class="material-symbols-outlined text-warning-red !text-3xl">report_problem</span>
</div>
<div>
<h3 class="text-[#111815] tracking-tight text-xl font-bold leading-tight">Harmful Substances Found</h3>
<p class="text-sm text-slate-500 font-medium">2 critical ingredients detected</p>
</div>
</div>
<!-- Risk Detail Grid -->
<div class="grid grid-cols-2 gap-3 mb-6">
<div class="bg-white/50 border border-slate-100 rounded-2xl p-4 flex flex-col gap-2">
<span class="material-symbols-outlined text-warning-red">pill</span>
<p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Source: Animal</p>
<p class="text-sm font-semibold text-[#111815]">Gelatin (Porcine)</p>
</div>
<div class="bg-white/50 border border-slate-100 rounded-2xl p-4 flex flex-col gap-2">
<span class="material-symbols-outlined text-warning-red">science</span>
<p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Type: Colorant</p>
<p class="text-sm font-semibold text-[#111815]">E120 (Carmine)</p>
</div>
</div>
<!-- Call to Action -->
<div class="flex flex-col gap-3">
<button class="w-full bg-primary hover:brightness-105 text-background-dark py-4 px-6 rounded-2xl font-bold text-base flex items-center justify-center gap-2 shadow-sm transition-all">
<span class="material-symbols-outlined">search_check</span>
                        Find Halal Alternatives
                    </button>
<button class="w-full bg-transparent border-2 border-slate-100 text-slate-600 py-4 px-6 rounded-2xl font-bold text-base flex items-center justify-center gap-2">
                        View Full Laboratory Analysis
                    </button>
</div>
</div>
</div>
</div>
<!-- Hidden padding to ensure content doesn't get clipped -->
<div class="h-5 bg-background-light dark:bg-background-dark"></div>
</body></html>
