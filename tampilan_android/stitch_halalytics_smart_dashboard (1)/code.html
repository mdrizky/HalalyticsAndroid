<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Halalytics Smart Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00a86b",
                        "background-light": "#f5f8f7",
                        "background-dark": "#0b120f",
                        "glass-border": "rgba(255, 255, 255, 0.1)",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1.5rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .neon-glow {
            filter: drop-shadow(0 0 8px #00a86b);
        }
        .liquid-blue {
            background: linear-gradient(180deg, rgba(0, 168, 107, 0) 0%, rgba(37, 99, 235, 0.4) 100%);
        }
        .liquid-amber {
            background: linear-gradient(180deg, rgba(0, 168, 107, 0) 0%, rgba(180, 83, 9, 0.4) 100%);
        }
        body {
            background-attachment: fixed;
            background-image: radial-gradient(circle at top right, #0d2a1f, #0b120f);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-white min-h-screen pb-32">
<!-- Top AppBar -->
<header class="flex items-center p-6 justify-between">
<div class="flex items-center gap-3">
<div class="size-12 shrink-0 rounded-full border-2 border-primary p-0.5 overflow-hidden">
<div class="w-full h-full bg-center bg-no-repeat bg-cover rounded-full" data-alt="User profile portrait in a futuristic style" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuA9qSBMre37Wpbn3rtRYnH9E8UtTIsYfFk2y3DSxLxUyol99_kfe7uJ_hQPmHCNt8trYDhy8eNYlfkR8a7HJxRQdwlgkT4TCMFnDGb2lvU33lKwPUPbimnpdsLeuvBADDZNPLjG40QsfNYIU6lNW_XPbCv9t5X1j-YzPbJikY0pAYxlYtBi8d98sM4zi2tknrcjwvGRTb354TpP_p8hK2CUAbvT2Mhujn62xT6vXLEkw9S5CmbDKve-kICCMbvWsD3T9T04WXKZFcnI");'>
</div>
</div>
<div>
<p class="text-xs text-primary/80 font-medium">Assalamu Alaikum,</p>
<h2 class="text-white text-lg font-bold leading-tight">Ahmed K.</h2>
</div>
</div>
<button class="size-11 glass-card rounded-full flex items-center justify-center relative">
<span class="material-symbols-outlined text-white">notifications</span>
<span class="absolute top-2.5 right-2.5 size-2 bg-primary rounded-full neon-glow"></span>
</button>
</header>
<main class="px-6 space-y-8">
<!-- Hero: Calorie & Halal Progress -->
<section class="glass-card rounded-xl p-8 text-center relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary to-transparent opacity-50"></div>
<div class="relative inline-flex items-center justify-center">
<!-- Progress Ring SVG -->
<svg class="size-48 transform -rotate-90">
<circle class="text-white/5" cx="96" cy="96" fill="transparent" r="88" stroke="currentColor" stroke-width="12"></circle>
<circle class="text-primary neon-glow" cx="96" cy="96" fill="transparent" r="88" stroke="currentColor" stroke-dasharray="552.92" stroke-dashoffset="82.93" stroke-linecap="round" stroke-width="12"></circle>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center">
<p class="text-4xl font-bold tracking-tighter">85%</p>
<p class="text-[10px] uppercase tracking-widest text-primary font-bold">Halal Integrity</p>
</div>
</div>
<div class="mt-6 flex justify-between items-end">
<div class="text-left">
<p class="text-white/60 text-sm">Calorie Intake</p>
<p class="text-xl font-bold">1,840 <span class="text-xs font-normal text-white/40">/ 2,200</span></p>
</div>
<div class="text-right flex items-center gap-1 text-primary">
<span class="material-symbols-outlined text-sm">trending_up</span>
<span class="text-sm font-bold">+5.2%</span>
</div>
</div>
</section>
<!-- Grid: Water & Caffeine Trackers -->
<section class="grid grid-cols-2 gap-4">
<!-- Water Tracker -->
<div class="glass-card rounded-xl p-5 relative overflow-hidden flex flex-col justify-between aspect-square">
<div class="absolute bottom-0 left-0 right-0 h-3/5 liquid-blue opacity-50"></div>
<div class="relative z-10 flex justify-between items-start">
<span class="material-symbols-outlined text-blue-400">water_drop</span>
<span class="text-[10px] font-bold text-white/40">64%</span>
</div>
<div class="relative z-10">
<p class="text-white/60 text-xs">Water</p>
<p class="text-lg font-bold leading-tight">1.6L <span class="text-[10px] text-white/30 block">Target: 2.5L</span></p>
</div>
</div>
<!-- Caffeine Tracker -->
<div class="glass-card rounded-xl p-5 relative overflow-hidden flex flex-col justify-between aspect-square">
<div class="absolute bottom-0 left-0 right-0 h-2/5 liquid-amber opacity-40"></div>
<div class="relative z-10 flex justify-between items-start">
<span class="material-symbols-outlined text-amber-600">coffee</span>
<span class="text-[10px] font-bold text-white/40">40%</span>
</div>
<div class="relative z-10">
<p class="text-white/60 text-xs">Caffeine</p>
<p class="text-lg font-bold leading-tight">120mg <span class="text-[10px] text-white/30 block">Limit: 300mg</span></p>
</div>
</div>
</section>
<!-- Quick Insights Card -->
<section>
<div class="flex items-center justify-between mb-4">
<h3 class="text-white text-lg font-bold tracking-tight px-1">Quick Insights</h3>
<button class="text-primary text-sm font-medium">Full Report</button>
</div>
<div class="glass-card rounded-xl p-6">
<div class="flex items-center justify-between mb-6">
<div>
<p class="text-white/60 text-xs">7-Day Health Trend</p>
<p class="text-xl font-bold">Optimal Range</p>
</div>
<div class="bg-primary/20 px-3 py-1 rounded-full">
<p class="text-primary text-xs font-bold">+12%</p>
</div>
</div>
<div class="flex items-end justify-between h-24 gap-3">
<div class="flex-1 bg-white/5 rounded-t-lg relative group">
<div class="absolute bottom-0 left-0 right-0 bg-primary/40 h-[50%] rounded-t-lg group-hover:bg-primary transition-all"></div>
<p class="absolute -bottom-6 left-1/2 -translate-x-1/2 text-[10px] text-white/40 font-bold">M</p>
</div>
<div class="flex-1 bg-white/5 rounded-t-lg relative group">
<div class="absolute bottom-0 left-0 right-0 bg-primary/40 h-[80%] rounded-t-lg group-hover:bg-primary transition-all"></div>
<p class="absolute -bottom-6 left-1/2 -translate-x-1/2 text-[10px] text-white/40 font-bold">T</p>
</div>
<div class="flex-1 bg-white/5 rounded-t-lg relative group">
<div class="absolute bottom-0 left-0 right-0 bg-primary/40 h-[60%] rounded-t-lg group-hover:bg-primary transition-all"></div>
<p class="absolute -bottom-6 left-1/2 -translate-x-1/2 text-[10px] text-white/40 font-bold">W</p>
</div>
<div class="flex-1 bg-white/5 rounded-t-lg relative group">
<div class="absolute bottom-0 left-0 right-0 bg-primary/40 h-[95%] rounded-t-lg group-hover:bg-primary transition-all"></div>
<p class="absolute -bottom-6 left-1/2 -translate-x-1/2 text-[10px] text-white/40 font-bold">T</p>
</div>
<div class="flex-1 bg-white/5 rounded-t-lg relative group">
<div class="absolute bottom-0 left-0 right-0 bg-primary/40 h-[50%] rounded-t-lg group-hover:bg-primary transition-all"></div>
<p class="absolute -bottom-6 left-1/2 -translate-x-1/2 text-[10px] text-white/40 font-bold">F</p>
</div>
<div class="flex-1 bg-white/5 rounded-t-lg relative group">
<div class="absolute bottom-0 left-0 right-0 bg-primary/40 h-[100%] rounded-t-lg group-hover:bg-primary transition-all"></div>
<p class="absolute -bottom-6 left-1/2 -translate-x-1/2 text-[10px] text-white/40 font-bold">S</p>
</div>
<div class="flex-1 bg-white/5 rounded-t-lg relative group">
<div class="absolute bottom-0 left-0 right-0 bg-primary/40 h-[40%] rounded-t-lg group-hover:bg-primary transition-all"></div>
<p class="absolute -bottom-6 left-1/2 -translate-x-1/2 text-[10px] text-white/40 font-bold">S</p>
</div>
</div>
</div>
</section>
</main>
<!-- Floating Dock Navigation -->
<nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[85%] max-w-md">
<div class="glass-card rounded-full p-2 flex items-center justify-between border-white/20">
<a class="size-12 flex items-center justify-center text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">home</span>
</a>
<a class="size-12 flex items-center justify-center text-white/60" href="#">
<span class="material-symbols-outlined">bar_chart</span>
</a>
<button class="size-14 -mt-4 bg-primary text-white rounded-full flex items-center justify-center shadow-lg shadow-primary/40 neon-glow">
<span class="material-symbols-outlined text-3xl">qr_code_scanner</span>
</button>
<a class="size-12 flex items-center justify-center text-white/60" href="#">
<span class="material-symbols-outlined">group</span>
</a>
<a class="size-12 flex items-center justify-center text-white/60" href="#">
<span class="material-symbols-outlined">person</span>
</a>
</div>
</nav>
<!-- Background Decoration -->
<div class="fixed top-1/2 left-0 -translate-x-1/2 -translate-y-1/2 size-96 bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
</body></html>
